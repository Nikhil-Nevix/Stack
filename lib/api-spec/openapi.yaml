openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: STACK Service Desk AI Solution API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tickets
  - name: dashboard
  - name: reports
  - name: roi
  - name: logs
  - name: admin
  - name: sops
  - name: chat

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access restricted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets (role-filtered)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: use_case
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: sla_status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /v1/tickets/{ticketId}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket by ID
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update ticket
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
    delete:
      operationId: deleteTicket
      tags: [tickets]
      summary: Delete ticket (admin only)
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/tickets/{ticketId}/resolve:
    post:
      operationId: resolveTicket
      tags: [tickets]
      summary: Trigger AI resolution
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIResolution"

  /v1/tickets/{ticketId}/escalate:
    post:
      operationId: escalateTicket
      tags: [tickets]
      summary: Escalate ticket to agent
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Escalated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /v1/tickets/{ticketId}/notes:
    get:
      operationId: listTicketNotes
      tags: [tickets]
      summary: Get ticket notes
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketNote"
    post:
      operationId: addTicketNote
      tags: [tickets]
      summary: Add note to ticket
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketNote"

  /v1/tickets/{ticketId}/timeline:
    get:
      operationId: getTicketTimeline
      tags: [tickets]
      summary: Get ticket audit timeline
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"

  /v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Admin/agent dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /v1/dashboard/my-summary:
    get:
      operationId: getMyDashboardSummary
      tags: [dashboard]
      summary: User dashboard summary (own tickets only)
      responses:
        "200":
          description: User summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDashboardSummary"

  /v1/dashboard/live-queue:
    get:
      operationId: getLiveQueue
      tags: [dashboard]
      summary: Live ticket queue
      responses:
        "200":
          description: Live queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /v1/dashboard/sla-at-risk:
    get:
      operationId: getSLAAtRisk
      tags: [dashboard]
      summary: Tickets at SLA risk
      responses:
        "200":
          description: SLA at-risk tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /v1/dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent audit activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"

  /v1/reports/resolution-rate:
    get:
      operationId: getResolutionRate
      tags: [reports]
      summary: Resolution rate by use case
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
        - name: end_date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resolution rate report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolutionRateReport"

  /v1/reports/sla-compliance:
    get:
      operationId: getSLACompliance
      tags: [reports]
      summary: SLA compliance report
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
        - name: end_date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: SLA compliance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLAComplianceReport"

  /v1/reports/agent-performance:
    get:
      operationId: getAgentPerformance
      tags: [reports]
      summary: Agent performance report
      responses:
        "200":
          description: Agent performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPerformance"

  /v1/reports/ticket-trends:
    get:
      operationId: getTicketTrends
      tags: [reports]
      summary: Ticket trend analytics
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
        - name: end_date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ticket trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketTrendsReport"

  /v1/reports/ai-accuracy:
    get:
      operationId: getAIAccuracy
      tags: [reports]
      summary: AI accuracy analytics
      responses:
        "200":
          description: AI accuracy data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAccuracyReport"

  /v1/roi/current:
    get:
      operationId: getCurrentROI
      tags: [roi]
      summary: Current ROI metrics
      responses:
        "200":
          description: Current ROI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ROIMetric"

  /v1/roi/history:
    get:
      operationId: getROIHistory
      tags: [roi]
      summary: Historical ROI metrics
      responses:
        "200":
          description: ROI history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ROIMetric"

  /v1/roi/recalculate:
    post:
      operationId: recalculateROI
      tags: [roi]
      summary: Recalculate ROI
      responses:
        "200":
          description: Recalculated ROI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ROIMetric"

  /v1/roi/settings:
    patch:
      operationId: updateROISettings
      tags: [roi]
      summary: Update ROI cost settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ROISettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/logs/audit:
    get:
      operationId: getAuditLogs
      tags: [logs]
      summary: Get audit logs
      parameters:
        - name: ticket_id
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
        - name: end_date
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /v1/logs/api-calls:
    get:
      operationId: getAPICallLogs
      tags: [logs]
      summary: Get API call logs
      parameters:
        - name: api_name
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: API call logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APICallLog"

  /v1/logs/powershell:
    get:
      operationId: getPowershellLogs
      tags: [logs]
      summary: Get PowerShell execution logs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: PowerShell logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PowershellLog"

  /v1/admin/thresholds:
    get:
      operationId: listThresholds
      tags: [admin]
      summary: List confidence thresholds
      responses:
        "200":
          description: Thresholds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfidenceThreshold"

  /v1/admin/thresholds/{useCase}:
    patch:
      operationId: updateThreshold
      tags: [admin]
      summary: Update threshold for use case
      parameters:
        - name: useCase
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfidenceThreshold"

  /v1/admin/sla-configs:
    get:
      operationId: listSLAConfigs
      tags: [admin]
      summary: List SLA configurations
      responses:
        "200":
          description: SLA configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SLAConfig"
    patch:
      operationId: updateSLAConfigs
      tags: [admin]
      summary: Update SLA configurations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SLAConfigBatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/admin/groups:
    get:
      operationId: listAgentGroups
      tags: [admin]
      summary: List agent groups
      responses:
        "200":
          description: Agent groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentGroup"

  /v1/admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/admin/users/{userId}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/admin/system-health:
    get:
      operationId: getSystemHealth
      tags: [admin]
      summary: Get system health status
      responses:
        "200":
          description: System health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealth"

  /v1/sops:
    get:
      operationId: listSOPs
      tags: [sops]
      summary: List all SOPs
      responses:
        "200":
          description: SOPs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SOP"
    post:
      operationId: createSOP
      tags: [sops]
      summary: Create a SOP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SOPInput"
      responses:
        "201":
          description: SOP created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SOP"

  /v1/sops/{sopId}:
    get:
      operationId: getSOP
      tags: [sops]
      summary: Get SOP by ID
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SOP details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SOP"
    patch:
      operationId: updateSOP
      tags: [sops]
      summary: Update SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SOPUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SOP"
    delete:
      operationId: deleteSOP
      tags: [sops]
      summary: Delete SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /v1/chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message (Google Chat / Teams / Web)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [user_id, email, full_name, role, is_active, created_at]
      properties:
        user_id:
          type: string
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        department:
          type: ["string", "null"]
        device_name:
          type: ["string", "null"]
        is_active:
          type: boolean
        last_login:
          type: ["string", "null"]
        created_at:
          type: string

    UserInput:
      type: object
      required: [email, full_name, role, password]
      properties:
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        department:
          type: string
        password:
          type: string

    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
        role:
          type: string
        department:
          type: string
        is_active:
          type: boolean

    Ticket:
      type: object
      required: [ticket_id, title, use_case, status, priority, source, sla_status, created_at]
      properties:
        ticket_id:
          type: string
        freshservice_ticket_id:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        use_case:
          type: string
        status:
          type: string
        priority:
          type: string
        sla_deadline:
          type: ["string", "null"]
        sla_status:
          type: string
        sla_breach_predicted:
          type: boolean
        source:
          type: string
        user_id:
          type: string
        assigned_agent_id:
          type: ["string", "null"]
        resolution_type:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]
        closed_at:
          type: ["string", "null"]
        confidence_score:
          type: ["number", "null"]
        user_name:
          type: ["string", "null"]
        agent_name:
          type: ["string", "null"]

    TicketDetail:
      type: object
      required: [ticket_id, title, use_case, status, priority, source, sla_status, created_at]
      properties:
        ticket_id:
          type: string
        freshservice_ticket_id:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        use_case:
          type: string
        status:
          type: string
        priority:
          type: string
        sla_deadline:
          type: ["string", "null"]
        sla_status:
          type: string
        sla_breach_predicted:
          type: boolean
        source:
          type: string
        user_id:
          type: string
        assigned_agent_id:
          type: ["string", "null"]
        resolution_type:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]
        closed_at:
          type: ["string", "null"]
        confidence_score:
          type: ["number", "null"]
        user_name:
          type: ["string", "null"]
        agent_name:
          type: ["string", "null"]
        ai_resolution:
          $ref: "#/components/schemas/AIResolution"

    TicketListResponse:
      type: object
      required: [tickets, total, page, limit]
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    TicketInput:
      type: object
      required: [title, use_case, source]
      properties:
        title:
          type: string
        description:
          type: string
        use_case:
          type: string
        priority:
          type: string
        source:
          type: string
        device_name:
          type: string
        metadata:
          type: object
          additionalProperties: true

    TicketUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assigned_agent_id:
          type: string

    TicketNote:
      type: object
      required: [note_id, ticket_id, note_type, content, created_at]
      properties:
        note_id:
          type: string
        ticket_id:
          type: string
        note_type:
          type: string
        content:
          type: string
        created_by:
          type: ["string", "null"]
        is_internal:
          type: boolean
        created_at:
          type: string
        author_name:
          type: ["string", "null"]

    NoteInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        note_type:
          type: string
        is_internal:
          type: boolean

    AIResolution:
